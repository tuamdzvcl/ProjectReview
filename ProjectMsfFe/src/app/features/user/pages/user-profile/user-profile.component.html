<div class="profile-page">
  <!-- ====== ẢNH BÌA ====== -->
  <app-profile-cover
    [coverImageUrl]="coverImageUrl"
    [isOwner]="isOwner"
    (coverChange)="onCoverChange($event)"
  ></app-profile-cover>

  <div class="profile-container">
    <div class="profile-layout">
      <!-- ====== CỘT TRÁI - SIDEBAR ====== -->
      <app-profile-sidebar
        [user]="user"
        [profileImageUrl]="profileImageUrl"
        [isOwner]="isOwner"
        (avatarChange)="onAvatarChange($event)"
        (followClick)="onFollow()"
      ></app-profile-sidebar>

      <!-- ====== CỘT PHẢI - NỘI DUNG CHÍNH ====== -->
      <app-profile-content
        [isOwner]="isOwner"
        [events]="events"
      ></app-profile-content>
    </div>
  </div>
</div>
