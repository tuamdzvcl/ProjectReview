<main class="profile-content">
  <nav class="primary-tabs">
    <button class="tab-item" [class.active]="activeTab === 'home'" (click)="activeTab = 'home'">
      <i class="fa-solid fa-house"></i> Home
    </button>
    <button class="tab-item" [class.active]="activeTab === 'about'" (click)="activeTab = 'about'">
      <i class="fa-solid fa-circle-info"></i> About
    </button>

    
    <ng-container *ngIf="isOwner">
      <button class="tab-item" [class.active]="activeTab === 'setting'" (click)="activeTab = 'setting'">
        <i class="fa-solid fa-gear"></i> Setting
      </button>
      <button class="tab-item" [class.active]="activeTab === 'orders'" (click)="activeTab = 'orders'">
        <i class="fa-solid fa-box"></i> My Orders
      </button>
    </ng-container>
  </nav>

  
  <div class="secondary-tabs" *ngIf="activeTab === 'home'">
    <button *ngIf="isOwner" class="sub-tab" [class.active]="activeSubTab === 'saved'" (click)="activeSubTab = 'saved'">
      <span class="tab-badge badge-saved">1</span>
      <span class="tab-label">Sự kiện đã lưu</span>
    </button>
    <button class="sub-tab" [class.active]="activeSubTab === 'organised'" (click)="activeSubTab = 'organised'">
      <span class="tab-badge badge-organised">2</span>
      <span class="tab-label">Sự kiện đã tổ chức ({{ events.length }})</span>
    </button>
    <button class="sub-tab" [class.active]="activeSubTab === 'attending'" (click)="activeSubTab = 'attending'">
      <span class="tab-badge badge-attending">3</span>
      <span class="tab-label">Sự kiện đã tham gia</span>
    </button>
  </div>

  
  <div *ngIf="activeTab === 'home' && activeSubTab === 'organised'" class="event-list">
    <div *ngFor="let event of events" class="event-card">
      <div class="event-image">
        <img [src]="event.PosterUrl | imageUrl" [alt]="event.Title" />
      </div>
      <div class="event-body">
        <h3 class="event-title">{{ event.Title }}</h3>
        <p class="event-date">{{ event.StartDate | formatDate }}</p>
        <div class="event-actions">
          <button class="btn-save">
            <i class="fa-regular fa-bookmark"></i> Save
          </button>
          <button class="btn-view">
            <i class="fa-solid fa-arrow-up-right-from-square"></i> View
          </button>
        </div>
      </div>
    </div>
  </div>

  
  <div *ngIf="activeTab === 'home' && activeSubTab !== 'organised'" class="empty-state"> <i
      class="fa-regular fa-calendar-xmark"></i>
    <p>Chưa có sự kiện nào trong danh sách này.</p>
  </div>

  
  <div *ngIf="activeTab !== 'home'" class="empty-state">
    <i class="fa-solid fa-wrench"></i>
    <p>Tính năng đang được phát triển...</p>
  </div>
</main>
