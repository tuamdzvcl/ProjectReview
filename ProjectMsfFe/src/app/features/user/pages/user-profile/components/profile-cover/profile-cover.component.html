<div class="profile-cover">
  <img [src]="coverImageUrl" alt="Ảnh bìa" />

  
  <div class="profile-cover__actions" *ngIf="isOwner">
    <label class="btn-change-image" for="cover-upload">
      <i class="fa-solid fa-image"></i>
      Change Image
      <input
        id="cover-upload"
        type="file"
        class="hidden-input"
        accept="image/*"
        (change)="onFileSelected($event)"
      />
    </label>
  </div>
</div>
