<app-auth-layout topText="Đã có tài khoản?" topLinkText="Đăng nhập" [topLinkTo]="['/auth/login']"
  title="Đăng ký tài khoản">
  <form class="form" [formGroup]="form" (ngSubmit)="submit()">
    <div class="grid-2">
      <label class="field">
        <span class="field__label">Họ*</span>
        <input class="field__control" type="text" placeholder="Nhập họ" autocomplete="given-name"
          formControlName="firstName" />
        @if (form.controls.firstName.touched && form.controls.firstName.invalid)
        {
        <span class="field__error">Vui lòng nhập họ.</span>
        }
      </label>

      <label class="field">
        <span class="field__label">Tên(*)</span>
        <input class="field__control" type="text" placeholder="Nhập tên" autocomplete="family-name"
          formControlName="lastName" />
        @if (form.controls.lastName.touched && form.controls.lastName.invalid) {
        <span class="field__error">Vui lòng nhập tên.</span>
        }
      </label>
    </div>

    <label class="field">
      <span class="field__label">Email*</span>
      <input class="field__control" type="email" inputmode="email" placeholder="Nhập địa chỉ email" autocomplete="email"
        formControlName="email" />
      @if (form.controls.email.touched && form.controls.email.invalid) {
      <span class="field__error">Vui lòng nhập email hợp lệ.</span>
      }
    </label>

    <label class="field">
      <span class="field__label">Mật khẩu*</span>
      <div class="field__controlWrap" style="position: relative;">
        <input class="field__control" [type]="passwordVisible() ? 'text' : 'password'" placeholder="Nhập mật khẩu"
          autocomplete="new-password" formControlName="password" style="width: 100%;" />
        <button class="field__toggle" type="button" (click)="togglePassword()"
          style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); border: none; background: transparent; cursor: pointer;"
          [attr.aria-label]="
            passwordVisible() ? 'Ẩn mật khẩu' : 'Hiện mật khẩu'
          " [attr.aria-pressed]="passwordVisible()">
          <i class="fa" [ngClass]="passwordVisible() ? 'fa-eye-slash' : 'fa-eye'"></i>
        </button>
      </div>
      @if (form.controls.password.touched && form.controls.password.invalid) {
      <span class="field__error">Mật khẩu phải có ít nhất 6 ký tự.</span>
      }
    </label>

    <label class="field" style="margin-top: 1rem;">
      <span class="field__label">Nhập lại mật khẩu*</span>
      <div class="field__controlWrap" style="position: relative;">
        <input class="field__control" [type]="confirmPasswordVisible() ? 'text' : 'password'"
          placeholder="Nhập lại mật khẩu" autocomplete="new-password" formControlName="confirmPassword"
          style="width: 100%;" />
        <button class="field__toggle" type="button" (click)="toggleConfirmPassword()"
          style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); border: none; background: transparent; cursor: pointer;"
          [attr.aria-label]="
            confirmPasswordVisible() ? 'Ẩn mật khẩu' : 'Hiện mật khẩu'
          " [attr.aria-pressed]="confirmPasswordVisible()">
          <i class="fa" [ngClass]="confirmPasswordVisible() ? 'fa-eye-slash' : 'fa-eye'"></i>
        </button>
      </div>
      @if (form.controls.confirmPassword.touched && form.controls.confirmPassword.hasError('required')) {
      <span class="field__error">Vui lòng nhập lại mật khẩu.</span>
      } @else if (form.controls.confirmPassword.touched && form.hasError('passwordMismatch')) {
      <span class="field__error">Mật khẩu nhập lại không khớp.</span>
      }
    </label>

    <button class="btn btn--primary" type="submit" [disabled]="isSubmitting()" style="margin-top: 1.5rem;">
      @if (isSubmitting()) { Đang đăng ký... } @else { Đăng ký }
    </button>

    <div class="muted" style="margin-top: 1rem; font-size: 0.8125rem; color: #6b7280; text-align: center;">
      Bằng cách nhấn “Đăng ký”, bạn đồng ý với
      <a class="link" href="#" (click)="$event.preventDefault()">Điều khoản &amp; Điều kiện</a>
      của chúng tôi và đã đọc
      <a class="link" href="#" (click)="$event.preventDefault()">Chính sách bảo mật</a>.
    </div>
  </form>
</app-auth-layout>
