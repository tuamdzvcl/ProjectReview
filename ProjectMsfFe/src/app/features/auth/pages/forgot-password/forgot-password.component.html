<app-auth-layout topText="Nhớ lại mật khẩu?" topLinkText="Đăng nhập" [topLinkTo]="['/auth/login']"
  title="Quên mật khẩu" [showSocial]="false">
  @if (isSuccess()) {
  <div class="alert-success">
    Chúng tôi đã gửi link đặt lại mật khẩu đến <strong>{{ form.value.email }}</strong>.<br>
    Vui lòng kiểm tra hộp thư của bạn.
  </div>

  <button class="btn btn--primary" type="button" routerLink="/auth/login" style="width: 100%;">
    Quay lại Đăng nhập
  </button>
  } @else {
  <p class="text-muted">
    Nhập địa chỉ email được liên kết với tài khoản của bạn và chúng tôi sẽ gửi cho bạn link để đặt lại mật khẩu.
  </p>

  <form class="form" [formGroup]="form" (ngSubmit)="submit()">
    <label class="field">
      <span class="field__label">Email của bạn*</span>
      <input class="field__control" type="email" inputmode="email" autocomplete="email" placeholder="Nhập email"
        formControlName="email" />
      @if (form.controls.email.touched && form.controls.email.invalid) {
      <span class="field__error">Vui lòng nhập email hợp lệ.</span>
      }
    </label>

    <button class="btn btn--primary" type="submit" [disabled]="isSubmitting()" style="margin-top: 1rem;">
      @if (isSubmitting()) { Đang gửi link... } @else { Gửi link đặt lại mật khẩu }
    </button>
  </form>
  }
</app-auth-layout>
