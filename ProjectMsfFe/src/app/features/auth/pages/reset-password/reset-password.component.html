<app-auth-layout topText="Nhớ lại mật khẩu?" topLinkText="Đăng nhập" [topLinkTo]="['/auth/login']"
  title="Đặt lại mật khẩu" [showSocial]="false">
  @if (isSuccess()) {
  <div class="alert-success">
    Mật khẩu của bạn đã được thay đổi thành công.<br>
    Bây giờ bạn có thể đăng nhập bằng mật khẩu mới.
  </div>

  <button class="btn btn--primary" type="button" routerLink="/auth/login" style="width: 100%;">
    Quay lại Đăng nhập
  </button>
  } @else {
  <p class="text-muted">
    Vui lòng nhập mật khẩu mới của bạn bên dưới.
  </p>

  <form class="form" [formGroup]="form" (ngSubmit)="submit()">
    <label class="field">
      <span class="field__label">Mật khẩu mới*</span>
      <div class="field__controlWrap">
        <input class="field__control" [type]="passwordVisible() ? 'text' : 'password'"
          placeholder="Nhập mật khẩu mới" formControlName="password" />
        <button class="field__toggle" type="button" (click)="togglePassword()">
          <i class="fa" [ngClass]="passwordVisible() ? 'fa-eye-slash' : 'fa-eye'"></i>
        </button>
      </div>
      @if (form.controls.password.touched && form.controls.password.invalid) {
      <span class="field__error">Mật khẩu phải có ít nhất 6 ký tự.</span>
      }
    </label>

    <label class="field">
      <span class="field__label">Xác nhận mật khẩu*</span>
      <div class="field__controlWrap">
        <input class="field__control" [type]="confirmPasswordVisible() ? 'text' : 'password'"
          placeholder="Xác nhận mật khẩu mới" formControlName="confirmPassword" />
        <button class="field__toggle" type="button" (click)="toggleConfirmPassword()">
          <i class="fa" [ngClass]="confirmPasswordVisible() ? 'fa-eye-slash' : 'fa-eye'"></i>
        </button>
      </div>
      @if (form.controls.confirmPassword.touched && form.hasError('notMatching')) {
      <span class="field__error">Mật khẩu không khớp.</span>
      }
    </label>

    <button class="btn btn--primary" type="submit" [disabled]="isSubmitting()">
      @if (isSubmitting()) { Đang xử lý... } @else { Đặt lại mật khẩu }
    </button>
  </form>
  }
</app-auth-layout>
