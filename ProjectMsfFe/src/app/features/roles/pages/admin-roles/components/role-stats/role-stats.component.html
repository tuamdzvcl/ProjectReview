<div class="stats-row">
  <div class="stat-card">
    <div class="stat-icon"><i class="fa-solid fa-user-shield"></i></div>
    <div class="stat-info">
      <span class="stat-value">{{ totalRoles }}</span>
      <span class="stat-label">Tổng Role</span>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon system"><i class="fa-solid fa-lock"></i></div>
    <div class="stat-info">
      <span class="stat-value">{{ systemRoleCount }}</span>
      <span class="stat-label">Role hệ thống</span>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon custom"><i class="fa-solid fa-user-gear"></i></div>
    <div class="stat-info">
      <span class="stat-value">{{ customRoleCount }}</span>
      <span class="stat-label">Role tùy chỉnh</span>
    </div>
  </div>
  <div class="stat-card">
    <div class="stat-icon perms"><i class="fa-solid fa-key"></i></div>
    <div class="stat-info">
      <span class="stat-value">{{ totalPermissions }}</span>
      <span class="stat-label">Tổng Permission</span>
    </div>
  </div>
</div>
