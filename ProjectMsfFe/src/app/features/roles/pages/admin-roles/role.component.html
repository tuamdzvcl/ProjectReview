<div class="box">
  <div class="role-page">
    <!-- Header -->
    <div class="page-header">
      <div class="header-left">
        <h1 class="page-title">
          <i class="fa-solid fa-shield-halved"></i>
          Quản lý Phân quyền
        </h1>
        <p class="page-subtitle">Quản lý các vai trò và quyền hạn trong hệ thống</p>
      </div>
      <button class="btn btn-primary" (click)="showAddRoleDialog()">
        <i class="fa-solid fa-plus"></i> Thêm Role mới
      </button>
    </div>

    <!-- Stats Cards -->
    <app-role-stats
      [totalRoles]="roles().length"
      [systemRoleCount]="systemRoleCount"
      [customRoleCount]="customRoleCount"
      [totalPermissions]="allPermissions.length"
    ></app-role-stats>

    <!-- Roles Table -->
    <app-role-table
    [roles]="roles"
    (editRole)="showEditRoleDialog($event)"
    (deleteRole)="deleteRole($event)"
    (viewPermissions)="handleViewPermissions($event)"
    (managePermissions)="handleManagePermissions($event)"
  ></app-role-table>
  </div>
</div>

<!-- ========== DIALOG: Thêm / Sửa Role ========== -->
<app-role-form-dialog
  [(visible)]="displayRoleDialog"
  [isEditMode]="isEditMode"
  [role]="selectedRole"
  [allPermissions]="allPermissions"
  (save)="handleSaveRole($event)"
></app-role-form-dialog>

<!-- ========== DIALOG: Quản lý Permissions cho 1 Role ========== -->
<app-role-permission-dialog
  [(visible)]="displayPermDialog"
  [role]="selectedRole"
  [readonly]="permDialogReadonly"
  [allPermissions]="allPermissions"
  (save)="handleSavePermissions($event)"
></app-role-permission-dialog>
