<div class="box">
  <div class="topbar__left">
    <h1 class="topbar__title">Duyệt sự kiện</h1>
  </div>

  <section class="approve-header card">
    <div class="header-main">
      <h2 class="header-title">Danh sách chờ duyệt ({{ totalRecords }})</h2>
      <div class="search-container">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" placeholder="Tìm kiếm sự kiện chờ duyệt..." (input)="onSearch($event)" class="search-input" />
      </div>
    </div>
  </section>

  <div class="events-list">
    <div class="event-card card" *ngFor="let event of events">
      <div class="event-poster" (click)="viewDetails(event)">
        <img [src]="event.PosterUrl | imageUrl" [alt]="event.Title" />
        <div class="status-badge" [ngClass]="'status-' + event.Status.toLowerCase()">
          {{ event.Status }}
        </div>
      </div>

      <div class="event-info">
        <h3 class="event-title" (click)="viewDetails(event)">{{ event.Title }}</h3>
        <p class="event-meta">
          <span class="meta-item">
            <i class="fa-regular fa-calendar"></i>
            {{ event.StartDate | formatDate }}
          </span>
          <span class="meta-item" title="Địa điểm">
            <i class="fa-solid fa-location-dot"></i>
            {{ event.Location }}
          </span>
          <span class="meta-item" title="Người tạo">
            <i class="fa-solid fa-user"></i>
            {{ event.UserName }}
          </span>
        </p>

        <div class="ticket-summary">
          <div class="summary-item">
            <span class="label">Tổng số vé:</span>
            <span class="value">{{ event.ListTypeTick?.length || 0 }} loại vé</span>
          </div>
        </div>
      </div>

      <div class="event-actions">
        <button class="btn-approve" *ngIf="event.Status !== 'PUBLISHED'" (click)="approveEvent(event)">
          <i class="fa-solid fa-check"></i>
          Duyệt
        </button>
        <button class="btn-reject" *ngIf="event.Status !== 'PUBLISHED'" (click)="rejectEvent(event)">
          <i class="fa-solid fa-xmark"></i>
          Từ chối
        </button>
        <button class="btn-details" (click)="viewDetails(event)">
          Chi tiết
        </button>
        <button class="btn-delete" (click)="deleteEvent(event)">
          <i class="fa-solid fa-trash-can"></i>
          Xóa
        </button>
      </div>
    </div>

    <div class="no-data" *ngIf="events.length === 0">
      <div class="no-data-content">
        <i class="fa-solid fa-clipboard-check no-data-icon"></i>
        <p>Hiện không có sự kiện nào cần phê duyệt.</p>
      </div>
    </div>
  </div>
</div>

<p-toast />
<p-confirmDialog />
