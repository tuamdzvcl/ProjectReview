<div class="box">
  <div class="dashboard-page">
    <div class="topbar__left">
      <h1 class="topbar__title">Quản lý Khuyến mãi</h1>
    </div>
    <div class="page-header">
      <button class="btn btn-primary">
        <i class="fa-solid fa-plus"></i> Thêm khuyến mãi mới
      </button>
    </div>

    <div class="cards-grid">
      <div class="promo-card">
        <div class="promo-header">
          <span class="badge active">Đang diễn ra</span>
          <h3>SUMMER2026</h3>
        </div>
        <div class="promo-body">
          <div class="info-row">
            <i class="fa-solid fa-percent"></i> <strong>Mức giảm:</strong>
            <span>20%</span>
          </div>
          <div class="info-row">
            <i class="fa-regular fa-calendar"></i> <strong>Hết hạn:</strong>
            <span>30/08/2026</span>
          </div>
          <div class="info-row">
            <i class="fa-solid fa-users"></i> <strong>Giới hạn:</strong>
            <span>500 lượt dùng</span>
          </div>
        </div>
        <div class="promo-actions">
          <button class="btn btn-icon edit">
            <i class="fa-solid fa-pen"></i> Sửa
          </button>
          <button class="btn btn-icon delete">
            <i class="fa-solid fa-trash"></i> Xóa
          </button>
        </div>
      </div>

      <div class="promo-card">
        <div class="promo-header">
          <span class="badge inactive">Sắp tới</span>
          <h3>NEWYEAR2027</h3>
        </div>
        <div class="promo-body">
          <div class="info-row">
            <i class="fa-solid fa-money-bill"></i> <strong>Mức giảm:</strong>
            <span>50.000 VNĐ</span>
          </div>
          <div class="info-row">
            <i class="fa-regular fa-calendar"></i> <strong>Hết hạn:</strong>
            <span>01/01/2027</span>
          </div>
          <div class="info-row">
            <i class="fa-solid fa-users"></i> <strong>Giới hạn:</strong>
            <span>1000 lượt dùng</span>
          </div>
        </div>
        <div class="promo-actions">
          <button class="btn btn-icon edit">
            <i class="fa-solid fa-pen"></i> Sửa
          </button>
          <button class="btn btn-icon delete">
            <i class="fa-solid fa-trash"></i> Xóa
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
