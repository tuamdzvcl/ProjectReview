<div class="filter-tabs">
  <button 
    [class.active]="selectedCategoryId === null" 
    (click)="selectCategory(null)">
    Tất cả
  </button>
  
  <button 
    *ngFor="let cat of categories" 
    [class.active]="selectedCategoryId === cat.CatetoryId" 
    (click)="selectCategory(cat.CatetoryId)">
    {{ cat.Name }}
  </button>
</div>
