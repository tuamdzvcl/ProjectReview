<header class="header">
  <div class="logo">
    <span class="logo-circle">B</span>
    <span class="logo-text">Barren</span>
  </div>

  <nav class="nav" [class.active]="isMenuOpen">
    <a routerLink="/" (click)="closeMenu()">Trang chủ</a>
    <a routerLink="/discover" (click)="closeMenu()">Khám phá</a>
    <a (click)="closeMenu()">Bảng giá</a>
    <a (click)="closeMenu()">Bài viết</a>
    <a (click)="closeMenu()">Hỗ trợ</a>
    
    <!-- Move create button here for mobile, display controlled by SCSS -->
    <button *ngIf="canCreateEvent()" class="create-btn create-btn-mobile" routerLink="/event-create-page" (click)="closeMenu()">
      Create Event
    </button>
  </nav>

  <div class="actions">
    <button *ngIf="canCreateEvent()" class="create-btn create-btn-desktop" routerLink="/event-create-page">
      Create Event
    </button>

    <app-user-dropdown></app-user-dropdown>
    
    <button class="mobile-menu-btn" (click)="toggleMenu()">
      <i class="fa-solid" [ngClass]="isMenuOpen ? 'fa-xmark' : 'fa-bars'"></i>
    </button>
  </div>
</header>
